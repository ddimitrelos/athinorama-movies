name: Weekly Scrape

# Scheduled weekly scrape that replaces the old Windows Task Scheduler job.
# Runs scraper.py via auto_scrape_push.py, commits movies.db back to master,
# then uploads the fresh DB to PythonAnywhere and reloads the webapp.

on:
  schedule:
    # Thursday 13:00 UTC = 15:00 EET (winter) / 16:00 EEST (summer).
    # Athinorama publishes weekly listings on Thursday; this runs after.
    - cron: '0 13 * * 4'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 30 minutes wasn't enough once the missing-poster pass (commit 72d2b16)
    # was added — scrape + posters + commit + push together take ~30 min,
    # so the PA deploy step was getting killed by the timeout. 60 leaves
    # comfortable headroom.
    timeout-minutes: 60

    env:
      # Override scraper.py's Windows-default browsers path. Must be set for
      # both the `playwright install` step and the scraper run so they agree.
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers (chromium + OS deps)
        run: |
          python -m playwright install --with-deps chromium

      - name: Configure git identity for auto-commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Run scrape + commit + push
        run: python auto_scrape_push.py

      - name: Deploy fresh DB to PythonAnywhere
        env:
          PA_USER: doctorfiftyfive
          PA_HOST: www.pythonanywhere.com
          PA_TOKEN: ${{ secrets.PA_API_TOKEN }}
        run: |
          curl -fsS -X POST -H "Authorization: Token $PA_TOKEN" \
            -F "content=@movies.db" \
            "https://$PA_HOST/api/v0/user/$PA_USER/files/path/home/$PA_USER/athinorama-movies/movies.db"
          curl -fsS -X POST -H "Authorization: Token $PA_TOKEN" \
            "https://$PA_HOST/api/v0/user/$PA_USER/webapps/$PA_USER.pythonanywhere.com/reload/"

      - name: Upload scrape log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auto-scrape-log
          path: auto_scrape.log
          if-no-files-found: ignore
