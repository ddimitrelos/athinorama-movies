<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- Red outer frame -->
  <rect x="1" y="1" width="46" height="46" rx="5" fill="#e50914"/>

  <!-- Top perforation strip -->
  <rect x="1" y="1" width="46" height="11" rx="5" fill="#c20812"/>
  <rect x="1" y="6" width="46" height="6" fill="#c20812"/>
  <rect x="4"  y="2.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>
  <rect x="14" y="2.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>
  <rect x="24" y="2.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>
  <rect x="34" y="2.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>

  <!-- Bottom perforation strip -->
  <rect x="1" y="36" width="46" height="11" rx="5" fill="#c20812"/>
  <rect x="1" y="36" width="46" height="6" fill="#c20812"/>
  <rect x="4"  y="37.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>
  <rect x="14" y="37.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>
  <rect x="24" y="37.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>
  <rect x="34" y="37.5" width="7" height="8" rx="1.5" fill="#0a0a14"/>

  <!-- Inner dark screen -->
  <rect x="1" y="13" width="46" height="22" fill="#0d0d1a"/>

  <!-- Yellow Α -->
  <text x="24" y="30"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="900"
        fill="#f5c518"
        text-anchor="middle"
        dominant-baseline="auto">Α</text>

  <!-- Star (top-right corner) -->
  <polygon
    points="41,12 42,15 45,15 42.5,17 43.5,20 41,18.2 38.5,20 39.5,17 37,15 40,15"
    fill="#f5c518"/>

</svg>
